{{ define "main" }}
<div class="site-main">
  <div style="max-width:720px;margin:0 auto;">
    <h1 style="font-size:1.875rem;font-weight:800;margin-bottom:2rem;">{{ .Title }}</h1>
    <div class="tag-cloud">
      {{ range .Data.Terms.ByCount }}
        <a href="{{ .Page.RelPermalink }}" class="tag-pill" style="font-size:0.875rem;padding:0.4rem 1rem;">
          {{ .Page.Title }}
          <span style="opacity:0.6;margin-left:0.35rem;">({{ .Count }})</span>
        </a>
      {{ end }}
    </div>
  </div>
</div>
{{ end }}
