{{ define "main" }}
<div class="site-main">
  <div class="home-layout">
    <section>
      <h2 class="section-title">{{ .Title }}</h2>
      {{ .Content }}
      <div class="post-list">
        {{ range $i, $page := .Pages }}
          {{ partial "post-card.html" (dict "index" $i "page" $page) }}
        {{ end }}
      </div>
    </section>
    <aside class="sidebar">
      {{ partial "sidebar.html" . }}
    </aside>
  </div>
</div>
{{ end }}
