baseURL = "https://dataprane.com"
languageCode = "fr-FR"
defaultContentLanguage = "fr"
title = "dataprane"
theme = "dataprane"
summaryLength = 60
paginate = 10

[params]
  description = "Datascience appliquée à la santé"
  github = "https://github.com/dataprane"
  githubRepo = "https://github.com/CHU-Brest/dataprane"
  contribution = "/contribution"
  author = "Équipe Dataprane"

[taxonomies]
  category = "categories"
  tag = "tags"
  author = "authors"

[markup]
  [markup.highlight]
    style = "github-dark"
    lineNos = false
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
